<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Issue — UJSMS</title>
  <meta name="description" content="Browse the latest issue of the UNILESA Journal of Social and Management Sciences.">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<div id="navPlaceholder"></div>

<section class="page-banner">
  <div class="container page-banner-content">
    <div class="page-banner-breadcrumb">
      <a href="index.html">Home</a><span>/</span><span>Current Issue</span>
    </div>
    <h1 class="page-banner-title">Current Issue</h1>
    <p class="page-banner-sub">The latest published volume of UJSMS — July 2026.</p>
  </div>
</section>

<main>
<section class="section">
  <div class="container">

    <!-- Issue header -->
    <div id="issueHeader">
      <div class="loading-state"><div class="loader"></div><span>Loading issue…</span></div>
    </div>

    <!-- Filter / search bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin:40px 0 32px" data-reveal>
      <div class="tabs" style="margin-bottom:0;border-bottom:none;gap:8px" id="categoryTabs">
        <button class="tab-btn active" data-cat="all">All Articles</button>
      </div>
      <div class="search-bar" style="max-width:320px">
        <input type="search" id="articleSearch" placeholder="Search articles…" aria-label="Search articles">
        <button onclick="doSearch()">Search</button>
      </div>
    </div>

    <!-- Article list -->
    <div class="grid-3" id="articleGrid">
      <div class="loading-state" style="grid-column:1/-1"><div class="loader"></div><span>Loading articles…</span></div>
    </div>

  </div>
</section>
</main>

<div id="footerPlaceholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/components.js"></script>
<script>
let allArticles = [];

document.addEventListener('DOMContentLoaded', async () => {
  // Load latest issue
  let issue = null;
  try { issue = await fetchLatestIssue(); } catch(e){}

  renderIssueHeader(issue);

  // Load articles for this issue
  try {
    const issueId = issue?.id || null;
    allArticles = issueId ? await fetchArticles({ issueId }) : getFallbackArticles();
    if (!allArticles.length) allArticles = getFallbackArticles();
  } catch(e) {
    allArticles = getFallbackArticles();
  }

  buildCategoryTabs(allArticles);
  renderArticles(allArticles);
  initReveal();
});

function renderIssueHeader(issue) {
  const el = document.getElementById('issueHeader');
  const title = issue?.title || 'Vol. 1, Issue 1 — Inaugural Edition';
  const date  = issue?.published_date ? formatDate(issue.published_date) : 'July 2026';
  const coverUrl = issue?.cover_url ? storageUrl('covers', issue.cover_url) : 'assets/images/cover.jpg';
  const pdfUrl   = issue?.pdf_url   ? storageUrl('issues', issue.pdf_url)  : '#';

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:200px 1fr;gap:40px;align-items:start;padding:40px;background:var(--bg-alt);border-radius:var(--radius-xl);margin-bottom:8px" data-reveal>
      <div>
        <img src="${coverUrl}" alt="Journal cover" style="width:100%;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg)" onerror="this.src='assets/images/cover.jpg'">
      </div>
      <div>
        <div class="card-meta" style="margin-bottom:16px">
          <span class="tag tag-navy">Vol. ${issue?.volume || 1}</span>
          <span class="tag tag-blue">Issue ${issue?.issue_number || 1}</span>
          <span class="tag tag-green">Latest Issue</span>
        </div>
        <h2 style="font-size:clamp(1.4rem,2.5vw,2rem);margin-bottom:10px">${title}</h2>
        <p style="color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:6px">📅 Published: <strong>${date}</strong></p>
        <p style="color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:20px">📄 ${issue?.article_count || allArticles.length || '—'} articles in this issue</p>
        <p style="color:var(--text-secondary);line-height:1.8;font-size:var(--fs-sm);max-width:560px;margin-bottom:28px">
          ${issue?.description || 'The inaugural issue of UJSMS brings together cutting-edge research across social and management sciences, featuring contributions from scholars across Nigeria and the global academic community.'}
        </p>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          ${pdfUrl !== '#' ? `<a href="${pdfUrl}" target="_blank" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Full Issue (PDF)
          </a>` : ''}
          <a href="archives.html" class="btn btn-outline">Browse Archives</a>
        </div>
      </div>
    </div>`;
  initReveal();
}

function buildCategoryTabs(articles) {
  const cats = ['all', ...new Set(articles.map(a => a.category).filter(Boolean))];
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = cats.map(c => `
    <button class="tab-btn ${c === 'all' ? 'active' : ''}" data-cat="${c}" onclick="filterCat('${c}')">
      ${c === 'all' ? 'All Articles' : c}
    </button>`).join('');
}

function filterCat(cat) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  const filtered = cat === 'all' ? allArticles : allArticles.filter(a => a.category === cat);
  renderArticles(filtered);
}

function doSearch() {
  const q = document.getElementById('articleSearch').value.toLowerCase().trim();
  const filtered = allArticles.filter(a =>
    a.title?.toLowerCase().includes(q) ||
    (Array.isArray(a.authors) ? a.authors.join(' ') : a.authors || '').toLowerCase().includes(q) ||
    a.abstract?.toLowerCase().includes(q)
  );
  renderArticles(filtered);
}

document.getElementById('articleSearch')?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function renderArticles(articles) {
  const grid = document.getElementById('articleGrid');
  if (!articles.length) { showEmpty(grid, 'No articles found', '📭'); return; }
  grid.innerHTML = articles.map((a, i) => renderArticleCard(a, i)).join('');
  initReveal();
}

function renderArticleCard(a, idx = 0) {
  const authors = Array.isArray(a.authors) ? a.authors.join(', ') : (a.authors || '');
  const date = formatDate ? formatDate(a.created_at) : '';
  const abstract = truncate ? truncate(a.abstract || '', 160) : '';
  const pdfUrl = a.pdf_url ? storageUrl('pdfs', a.pdf_url) : null;
  return `
    <div class="card article-card" data-reveal data-reveal-delay="${idx % 3}">
      <div class="article-card-body">
        <div class="card-meta">
          <span class="tag tag-blue">${a.category || 'Article'}</span>
          <span style="font-size:var(--fs-xs);color:var(--text-muted)">${date}</span>
        </div>
        <h3 class="article-card-title">${a.title}</h3>
        <p class="article-card-authors">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;margin-right:4px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${authors}
        </p>
        <p class="article-card-abstract">${abstract}</p>
      </div>
      <div class="article-card-footer">
        <a href="article.html?id=${a.id}" class="btn btn-outline btn-sm">Read Online</a>
        ${pdfUrl ? `<a href="${pdfUrl}" target="_blank" class="btn btn-primary btn-sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>PDF
        </a>` : ''}
      </div>
    </div>`;
}

</body>
</html>
