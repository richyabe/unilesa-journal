<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — UJSMS</title>
  <meta name="description" content="Read research articles published in the UNILESA Journal of Social and Management Sciences.">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .article-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 48px;
      align-items: start;
    }
    .article-body {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 56px;
    }
    .article-title-main {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      line-height: 1.25;
      margin-bottom: 20px;
    }
    .article-authors-list { margin-bottom: 24px; }
    .author-chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--bg-alt); border: 1px solid var(--border);
      border-radius: 100px; padding: 6px 16px;
      font-size: var(--fs-sm); margin: 4px;
    }
    .article-meta-strip {
      display: flex; flex-wrap: wrap; gap: 24px;
      padding: 20px 0; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border); margin-bottom: 36px;
      font-size: var(--fs-sm); color: var(--text-secondary);
    }
    .article-meta-item { display: flex; align-items: center; gap: 8px; }
    .article-abstract {
      background: var(--bg-alt);
      border-left: 4px solid var(--royal);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 24px 28px; margin-bottom: 36px;
    }
    .article-abstract-title { font-size: var(--fs-sm); font-weight: 700; color: var(--royal); margin-bottom: 10px; font-family:'JetBrains Mono',monospace; letter-spacing:.08em; text-transform:uppercase; }
    .article-keywords { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
    .keyword { background: rgba(30,90,168,.08); color: var(--royal); padding: 4px 12px; border-radius: 100px; font-size: var(--fs-xs); font-weight: 500; }
    .article-content-body { font-size: var(--fs-base); line-height: 1.9; color: var(--text-primary); }
    .article-content-body h3 { font-size: var(--fs-xl); margin: 36px 0 14px; }
    .article-content-body h4 { font-size: var(--fs-lg); margin: 28px 0 10px; }
    .article-content-body p  { margin-bottom: 18px; }
    .article-content-body blockquote { border-left: 3px solid var(--royal); padding: 12px 20px; margin: 20px 0; color: var(--text-secondary); font-style: italic; }
    .sidebar-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 20px; }
    .sidebar-heading { font-size: var(--fs-sm); font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .cite-box { background: var(--bg-alt); border-radius: var(--radius-sm); padding: 14px; font-size: 11px; font-family:'JetBrains Mono',monospace; line-height: 1.7; color: var(--text-secondary); margin-top: 10px; }
    @media(max-width: 1024px) { .article-layout { grid-template-columns: 1fr; } }
    @media(max-width: 768px) { .article-body { padding: 28px 20px; } }
  </style>
</head>
<body>

<div id="navPlaceholder"></div>

<div style="height:var(--nav-h)"></div>

<main>
<div class="container" style="padding-top:40px;padding-bottom:80px">

  <!-- Breadcrumb -->
  <div class="page-banner-breadcrumb" style="margin-bottom:28px;color:var(--text-muted)">
    <a href="index.html">Home</a><span style="color:var(--border)">/</span>
    <a href="current-issue.html">Current Issue</a><span style="color:var(--border)">/</span>
    <span id="articleCrumb" style="color:var(--text-secondary)">Article</span>
  </div>

  <div id="articleLoader" class="loading-state"><div class="loader"></div><span>Loading article…</span></div>

  <div id="articleMain" style="display:none" class="article-layout">

    <!-- Main article -->
    <div>
      <article class="article-body" id="articleBody">
        <!-- Filled by JS -->
      </article>

      <!-- Comments section -->
      <div class="comments-section" id="commentsSection"></div>
    </div>

    <!-- Sidebar -->
    <aside>

      <!-- Download -->
      <div class="sidebar-card" id="downloadCard" style="background:linear-gradient(135deg,var(--navy),var(--royal));border:none;color:#fff">
        <div class="sidebar-heading" style="color:rgba(255,255,255,.7);border-bottom-color:rgba(255,255,255,.15)">Download Article</div>
        <a id="pdfDownloadBtn" href="#" class="btn btn-ghost" style="width:100%;justify-content:center;margin-bottom:10px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </a>
        <div style="font-size:var(--fs-xs);color:rgba(255,255,255,.5);text-align:center">Free · Open Access · CC-BY 4.0</div>
      </div>

      <!-- Article info -->
      <div class="sidebar-card" id="sidebarInfo">
        <div class="sidebar-heading">Article Information</div>
        <div id="sidebarInfoContent" style="font-size:var(--fs-sm);color:var(--text-secondary)"></div>
      </div>

      <!-- Cite -->
      <div class="sidebar-card">
        <div class="sidebar-heading">How to Cite</div>
        <div class="cite-box" id="citeBox">Loading citation…</div>
        <button class="btn btn-outline btn-sm" style="margin-top:12px;width:100%;justify-content:center" onclick="copyCitation()">📋 Copy Citation</button>
      </div>

      <!-- Share -->
      <div class="sidebar-card">
        <div class="sidebar-heading">Share This Article</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="shareArticle('twitter')"  class="btn btn-outline btn-sm">𝕏 Twitter</button>
          <button onclick="shareArticle('linkedin')" class="btn btn-outline btn-sm">in LinkedIn</button>
          <button onclick="copyLink()"               class="btn btn-outline btn-sm">🔗 Copy Link</button>
        </div>
      </div>

      <!-- Related -->
      <div class="sidebar-card">
        <div class="sidebar-heading">Related Articles</div>
        <div id="relatedArticles">
          <div class="loading-state" style="padding:20px 0"><div class="loader"></div></div>
        </div>
      </div>

    </aside>
  </div>

</div>
</main>

<div id="footerPlaceholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/components.js"></script>
<script>
let currentArticle = null;

document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) { location.href = 'current-issue.html'; return; }

  try {
    currentArticle = await fetchArticle(id);
  } catch(e) { currentArticle = null; }

  if (!currentArticle) {
    currentArticle = getFallbackArticle(id);
  }

  renderArticle(currentArticle);
  loadRelated(currentArticle.category);
  initComments('article', id, 'commentsSection');

  document.getElementById('articleLoader').style.display = 'none';
  document.getElementById('articleMain').style.display = 'grid';
  initReveal();
});

function renderArticle(a) {
  document.title = `${a.title} — UJSMS`;
  document.querySelector('meta[name="description"]').setAttribute('content', a.abstract || '');

  const authors = Array.isArray(a.authors) ? a.authors : [a.authors || 'Unknown Author'];
  const date    = formatDate(a.created_at || new Date().toISOString());
  const pdfUrl  = a.pdf_url ? storageUrl('pdfs', a.pdf_url) : null;

  // Breadcrumb
  document.getElementById('articleCrumb').textContent = truncate(a.title, 50);

  // PDF button
  const pdfBtn = document.getElementById('pdfDownloadBtn');
  if (pdfUrl) { pdfBtn.href = pdfUrl; pdfBtn.target = '_blank'; }
  else { document.getElementById('downloadCard').style.display = 'none'; }

  // Sidebar info
  document.getElementById('sidebarInfoContent').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:2px">Published</div><strong>${date}</strong></div>
      <div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:2px">Category</div><strong>${a.category || '—'}</strong></div>
      <div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:2px">Volume</div><strong>Vol. ${a.issues?.volume || 1}, Issue ${a.issues?.issue_number || 1}</strong></div>
      <div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:2px">License</div><strong>CC-BY 4.0</strong></div>
    </div>`;

  // Citation
  const authorsApa = authors.map(au => {
    const parts = au.trim().split(' ');
    const last = parts.pop();
    const initials = parts.map(p => p[0] + '.').join(' ');
    return `${last}, ${initials}`;
  }).join(', & ');
  const year = new Date(a.created_at || Date.now()).getFullYear();
  document.getElementById('citeBox').textContent =
    `${authorsApa} (${year}). ${a.title}. UNILESA Journal of Social and Management Sciences, ${a.issues?.volume || 1}(${a.issues?.issue_number || 1}). https://www.ujsms.com/article?id=${a.id}`;

  // Article body
  document.getElementById('articleBody').innerHTML = `
    <div class="card-meta" style="margin-bottom:16px">
      <span class="tag tag-blue">${a.category || 'Article'}</span>
      <span class="tag tag-green">Open Access</span>
      <span class="tag tag-navy">Peer Reviewed</span>
    </div>

    <h1 class="article-title-main">${a.title}</h1>

    <div class="article-authors-list">
      ${authors.map(au => `<span class="author-chip">👤 ${au}</span>`).join('')}
    </div>

    <div class="article-meta-strip">
      <div class="article-meta-item">📅 <span>${date}</span></div>
      <div class="article-meta-item">📂 <span>${a.category || 'Article'}</span></div>
      <div class="article-meta-item">📖 <span>Vol. ${a.issues?.volume || 1}, Issue ${a.issues?.issue_number || 1}</span></div>
      ${a.doi ? `<div class="article-meta-item">🔗 DOI: <a href="https://doi.org/${a.doi}" target="_blank">${a.doi}</a></div>` : ''}
    </div>

    <div class="article-abstract">
      <div class="article-abstract-title">Abstract</div>
      <p style="color:var(--text-secondary);line-height:1.8;margin:0">${a.abstract || 'No abstract available.'}</p>
    </div>

    ${a.keywords?.length ? `<div class="article-keywords">
      ${(Array.isArray(a.keywords) ? a.keywords : a.keywords.split(',')).map(k => `<span class="keyword">${k.trim()}</span>`).join('')}
    </div>` : ''}

    <div class="article-content-body">
      ${a.content || `
        <h3>1. Introduction</h3>
        <p>The full article content will be displayed here once loaded from the database. This section typically includes the background of the study, the research problem, objectives, and significance of the research.</p>
        <p>Authors are required to clearly articulate the research gap their study addresses and provide a logical justification for the chosen methodology.</p>

        <h3>2. Literature Review</h3>
        <p>This section provides a comprehensive review of existing scholarship relevant to the research topic, building the theoretical foundation for the study.</p>

        <h3>3. Methodology</h3>
        <p>The methodology section outlines the research design, data collection instruments, sampling strategy, and analytical approaches employed in the study.</p>

        <h3>4. Results and Discussion</h3>
        <p>Key findings are presented and discussed in relation to the existing literature. Statistical outputs, tables, and figures are used to support the analysis.</p>

        <h3>5. Conclusion</h3>
        <p>This section summarises the main findings, articulates their theoretical and practical implications, acknowledges the limitations of the study, and proposes directions for future research.</p>

        <h3>References</h3>
        <p style="color:var(--text-muted);font-style:italic;font-size:var(--fs-sm)">References will appear here in APA 7th Edition format.</p>
      `}
    </div>`;
}

async function loadRelated(category) {
  const container = document.getElementById('relatedArticles');
  try {
    let related = await fetchArticles({ limit: 4 });
    related = related.filter(a => a.id !== currentArticle?.id).slice(0, 3);
    if (!related.length) related = getFallbackRelated();
    container.innerHTML = related.map(a => `
      <a href="article.html?id=${a.id}" style="display:block;padding:12px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit">
        <div style="font-size:var(--fs-xs);color:var(--royal);margin-bottom:4px">${a.category || 'Article'}</div>
        <div style="font-size:var(--fs-sm);font-weight:600;line-height:1.4;color:var(--text-primary)">${truncate(a.title, 80)}</div>
      </a>`).join('');
  } catch(e) {
    container.innerHTML = getFallbackRelated().map(a => `
      <a href="article.html?id=${a.id}" style="display:block;padding:12px 0;border-bottom:1px solid var(--border);text-decoration:none">
        <div style="font-size:var(--fs-xs);color:var(--royal)">${a.category}</div>
        <div style="font-size:var(--fs-sm);font-weight:600">${truncate(a.title, 80)}</div>
      </a>`).join('');
  }
}

function copyCitation() {
  const text = document.getElementById('citeBox').textContent;
  navigator.clipboard.writeText(text).then(() => alert('Citation copied to clipboard!'));
}

function shareArticle(platform) {
  const url = encodeURIComponent(location.href);
  const title = encodeURIComponent(currentArticle?.title || 'Research Article — UJSMS');
  const urls = {
    twitter:  `https://twitter.com/intent/tweet?text=${title}&url=${url}`,
    linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${url}`,
  };
  window.open(urls[platform], '_blank', 'width=600,height=400');
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => alert('Link copied!'));
}

</script>
</body>
</html>
